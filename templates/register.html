<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AyuMithra - Register</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        .register-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 60vh;
            margin-top: 20px;
        }
        .register-card {
            background: rgba(30, 41, 59, 0.5);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 40px 0 rgba(0, 0, 0, 0.4);
            text-align: center;
        }
        .register-header h2 {
            margin-top: 0;
            margin-bottom: 25px;
            font-size: 26px;
            color: #f8fafc;
            font-weight: 600;
            letter-spacing: -0.5px;
        }
        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 13px;
            color: #94a3b8;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .form-control {
            width: 100%;
            padding: 14px;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            color: #f8fafc;
            font-size: 15px;
            transition: border-color 0.25s, box-shadow 0.25s;
            box-sizing: border-box;
        }
        .form-control:focus {
            outline: none;
            border-color: #0bbfbc;
            box-shadow: 0 0 0 3px rgba(11, 191, 188, 0.15);
        }
        .btn-register {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #0bbfbc, #009688);
            border: none;
            border-radius: 10px;
            color: #ffffff;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, opacity 0.2s, box-shadow 0.2s;
            margin-top: 15px;
            box-shadow: 0 4px 12px rgba(11, 191, 188, 0.3);
        }
        .btn-register:hover {
            opacity: 0.95;
            transform: translateY(-1px);
            box-shadow: 0 6px 16px rgba(11, 191, 188, 0.4);
        }
        .register-error {
            background: rgba(239, 68, 68, 0.15);
            border: 1px solid rgba(239, 68, 68, 0.4);
            color: #fca5a5;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 25px;
            font-size: 14px;
            text-align: left;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .login-link {
            margin-top: 25px;
            font-size: 14px;
            color: #94a3b8;
        }
        .login-link a {
            color: #0bbfbc;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.2s;
        }
        .login-link a:hover {
            color: #009688;
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <header style="margin-bottom: 30px;">
            <div class="logo-container">
                <svg class="ayumithra-logo" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
                    <circle cx="100" cy="100" r="90" fill="white" opacity="0.1"/>
                    <path d="M60 140 L60 80 Q60 60 75 65 L85 70" stroke="url(#orangeGradient)" stroke-width="12" fill="none" stroke-linecap="round"/>
                    <path d="M140 140 L140 80 Q140 60 125 65 L115 70" stroke="url(#greenGradient)" stroke-width="12" fill="none" stroke-linecap="round"/>
                    <path d="M75 65 L125 115" stroke="#E53935" stroke-width="10" fill="none" stroke-linecap="round"/>
                    <path d="M85 115 L115 85" stroke="#00BCD4" stroke-width="10" fill="none" stroke-linecap="round"/>
                    <defs>
                        <linearGradient id="orangeGradient" x1="0%" y1="0%" x2="0%" y2="100%">
                            <stop offset="0%" style="stop-color:#FF9800"/>
                            <stop offset="100%" style="stop-color:#F44336"/>
                        </linearGradient>
                        <linearGradient id="greenGradient" x1="0%" y1="0%" x2="0%" y2="100%">
                            <stop offset="0%" style="stop-color:#4CAF50"/>
                            <stop offset="100%" style="stop-color:#009688"/>
                        </linearGradient>
                    </defs>
                </svg>
                <h1>AyuMithra</h1>
            </div>
            <p class="subtitle">Care that speaks your language</p>
        </header>

        <main class="register-container">
            <div class="register-card">
                <div class="register-header">
                    <h2>Create Account</h2>
                </div>
                
                {% if error %}
                <div class="register-error">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="10"></circle>
                        <line x1="12" y1="8" x2="12" y2="12"></line>
                        <line x1="12" y1="16" x2="12.01" y2="16"></line>
                    </svg>
                    <span>{{ error }}</span>
                </div>
                {% endif %}
                
                <form action="/register" method="POST">
                    <div class="form-group">
                        <label for="username">Username</label>
                        <input type="text" id="username" name="username" class="form-control" placeholder="Choose a username" required autocomplete="username">
                    </div>
                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" name="password" class="form-control" placeholder="Create a password" required autocomplete="new-password">
                    </div>
                    <div class="form-group">
                        <label for="confirm_password">Confirm Password</label>
                        <input type="password" id="confirm_password" name="confirm_password" class="form-control" placeholder="Confirm your password" required autocomplete="new-password">
                    </div>
                    <button type="submit" class="btn-register">Register</button>
                </form>
                
                <div class="login-link">
                    Already have an account? <a href="/login">Sign In</a>
                </div>
            </div>
        </main>

        <footer>
            <p>&copy; 2024 AyuMithra. Care that speaks your language.</p>
        </footer>
    </div>
</body>
</html>
